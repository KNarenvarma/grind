<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Train">
<meta name="theme-color" content="#000000">
<title>Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000;
  --s1: #0B0B0D;
  --s2: #131316;
  --s3: #1C1C20;
  --sep: rgba(255,255,255,0.08);
  --sep2: rgba(255,255,255,0.14);
  --l1: #FFFFFF;
  --l2: rgba(255,255,255,0.60);
  --l3: rgba(255,255,255,0.36);
  --l4: rgba(255,255,255,0.18);
  --red: #FF375F;
  --red-2: #FF2D55;
  --red-soft: rgba(255,55,95,0.12);
  --red-border: rgba(255,55,95,0.28);
  --green: #30D158;
  --yellow: #FFD60A;
  --blue: #0A84FF;
  --spring: cubic-bezier(0.16, 1, 0.3, 1);
  --quick: cubic-bezier(0.25, 1, 0.5, 1);
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--l1); font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 15px; line-height: 1.42; letter-spacing: -0.01em; font-feature-settings: 'ss01','ss03','cv11'; }
a { color: inherit; text-decoration: none; }
button, input, textarea, select { font-family: inherit; color: inherit; font-size: inherit; }
input, textarea, select { -webkit-appearance: none; appearance: none; background: transparent; border: none; outline: none; }
button { border: none; background: none; cursor: pointer; }
.tnum { font-variant-numeric: tabular-nums; }
.mono-num { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

/* APP SHELL */
#app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
#screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(82px + var(--sb)); -webkit-overflow-scrolling: touch; }
#screen::-webkit-scrollbar { display: none; }

/* HEADER */
.hdr { padding: calc(var(--st) + 14px) 20px 10px; position: sticky; top: 0; z-index: 10; background: rgba(0,0,0,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
.hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hdr-date { font-size: 13px; font-weight: 500; color: var(--l2); letter-spacing: -0.01em; }
.hdr-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--s2); display: flex; align-items: center; justify-content: center; color: var(--l1); transition: opacity 0.15s; }
.hdr-btn:active { opacity: 0.6; }
.hdr-h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.035em; line-height: 1.05; }

/* TAB BAR */
.tabs { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; display: flex; padding: 8px 8px calc(10px + var(--sb)); background: rgba(0,0,0,0.75); backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px); border-top: 0.5px solid var(--sep); }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 0; color: var(--l3); transition: color 0.15s; }
.tab.on { color: var(--red); }
.tab-ic { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.tab-ic svg { width: 23px; height: 23px; }
.tab-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0; }

/* SECTION */
.sec { padding: 0 20px 24px; }
.sec-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; padding-top: 4px; }
.sec-t { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; }
.sec-a { font-size: 14px; color: var(--red); font-weight: 500; letter-spacing: -0.01em; }
.sec-sub { font-size: 12px; color: var(--l3); font-weight: 500; letter-spacing: -0.005em; text-transform: uppercase; letter-spacing: 0.06em; }

/* HERO — TODAY SESSION */
.hero { margin: 0 20px 20px; padding: 20px; background: var(--s1); border: 0.5px solid var(--sep); border-radius: 22px; position: relative; overflow: hidden; }
.hero.active { background: linear-gradient(165deg, rgba(255,55,95,0.1), rgba(255,55,95,0.02)); border-color: var(--red-border); }
.hero-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.hero-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--red); display: flex; align-items: center; gap: 6px; }
.hero-cat.rest { color: var(--l3); }
.hero-cat .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
.hero-t { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-top: 8px; line-height: 1.1; }
.hero-meta { font-size: 14px; color: var(--l2); margin-top: 4px; font-weight: 500; }
.hero-btm { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; gap: 12px; }
.hero-prog { flex: 1; }
.hero-progtxt { font-size: 11px; color: var(--l3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
.hero-bar { height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.hero-fill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.6s var(--spring); }
.btn-hero { padding: 12px 18px; background: var(--l1); color: var(--bg); border-radius: 999px; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; display: inline-flex; align-items: center; gap: 6px; transition: transform 0.12s; }
.btn-hero:active { transform: scale(0.96); }
.btn-hero.primary { background: var(--red); color: #fff; }
.btn-hero svg { width: 14px; height: 14px; }

/* TRIPLE RING (APPLE FITNESS) */
.rings-hero { margin: 0 20px 20px; padding: 24px 20px; background: var(--s1); border: 0.5px solid var(--sep); border-radius: 22px; display: flex; align-items: center; gap: 24px; }
.rings-svg { flex-shrink: 0; }
.rings-stats { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.rstat { display: flex; align-items: center; gap: 10px; }
.rstat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rstat-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--l3); }
.rstat-val { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.rstat-val .unit { font-size: 13px; color: var(--l3); font-weight: 500; margin-left: 2px; }
.rstat-row { display: flex; flex-direction: column; }

/* METRIC CARDS */
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
.mcard { background: var(--s1); border: 0.5px solid var(--sep); border-radius: 18px; padding: 16px; position: relative; overflow: hidden; }
.mcard-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: var(--l3); }
.mcard-row svg { width: 14px; height: 14px; stroke-width: 1.8; }
.mcard-lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
.mcard-v { font-size: 32px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }
.mcard-v .unit { font-size: 13px; color: var(--l3); font-weight: 500; letter-spacing: -0.01em; margin-left: 3px; }
.mcard-sub { font-size: 12px; color: var(--l3); margin-top: 6px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
.mcard-sub svg { width: 11px; height: 11px; }
.mcard-sub .up { color: var(--red); }
.mcard-sub .dn { color: var(--green); }

/* WEEK DOTS */
.wdots { display: flex; gap: 8px; padding: 0 20px 22px; justify-content: space-between; }
.wdot { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 6px 0; border-radius: 12px; position: relative; }
.wdot.on { background: var(--s1); }
.wdot-d { font-size: 10px; font-weight: 700; color: var(--l3); letter-spacing: 0.05em; text-transform: uppercase; }
.wdot.on .wdot-d { color: var(--red); }
.wdot-ic { width: 22px; height: 22px; border-radius: 50%; border: 1.2px solid var(--l4); display: flex; align-items: center; justify-content: center; }
.wdot.done .wdot-ic { background: var(--red); border-color: var(--red); }
.wdot.rest .wdot-ic { border: none; }
.wdot.rest .wdot-ic::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--l4); }
.wdot.skip .wdot-ic { border-color: rgba(255,55,95,0.4); }
.wdot.skip .wdot-ic::after { content: '×'; color: rgba(255,55,95,0.6); font-size: 16px; font-weight: 600; line-height: 1; }

/* SUNDAY PROMPT */
.sun-card { margin: 0 20px 18px; padding: 14px 16px; background: var(--s1); border: 0.5px solid var(--red-border); border-radius: 16px; display: flex; align-items: center; gap: 14px; }
.sun-icon { width: 38px; height: 38px; border-radius: 12px; background: var(--red-soft); color: var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sun-icon svg { width: 18px; height: 18px; stroke-width: 1.6; }

/* WORKOUT TAB SELECTOR */
.wo-seg { display: flex; gap: 4px; padding: 0 20px 18px; overflow-x: auto; }
.wo-seg::-webkit-scrollbar { display: none; }
.wo-pill { flex-shrink: 0; padding: 9px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--l2); background: var(--s1); border: 0.5px solid var(--sep); letter-spacing: -0.01em; transition: all 0.15s; }
.wo-pill:active { transform: scale(0.97); }
.wo-pill.on { background: var(--red); color: #fff; border-color: var(--red); }

/* PROGRESS BAR */
.progbar-wrap { padding: 0 20px 18px; }
.progbar { height: 3px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.progbar-f { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.6s var(--spring); }

/* EXERCISE CARD */
.ex-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
.ex { background: var(--s1); border: 0.5px solid var(--sep); border-radius: 16px; overflow: hidden; }
.ex.done { opacity: 0.55; }
.ex-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
.ex-num { width: 26px; height: 26px; border-radius: 8px; background: var(--s3); color: var(--l2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.01em; }
.ex.done .ex-num { background: var(--red); color: #fff; }
.ex-info { flex: 1; min-width: 0; }
.ex-nm { font-size: 15px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.25; }
.ex.done .ex-nm { text-decoration: line-through; text-decoration-color: var(--l4); }
.ex-meta { font-size: 12px; color: var(--l3); font-weight: 500; margin-top: 2px; letter-spacing: -0.005em; }
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ex-count { font-size: 12px; font-weight: 600; color: var(--l2); font-variant-numeric: tabular-nums; min-width: 28px; text-align: right; letter-spacing: -0.01em; }
.ex-count.active { color: var(--red); }
.ex-chev { color: var(--l3); display: flex; transition: transform 0.25s var(--spring); }
.ex-chev.open { transform: rotate(180deg); color: var(--l1); }
.ex-body { border-top: 0.5px solid var(--sep); padding: 14px 16px 16px; animation: expandIn 0.35s var(--spring); transform-origin: top; }
@keyframes expandIn { from { opacity: 0; transform: translateY(-8px) scaleY(0.97); } to { opacity: 1; transform: translateY(0) scaleY(1); } }
.ex-muscle { font-size: 11px; color: var(--l3); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.ex-muscle svg { width: 11px; height: 11px; }

/* STEPS */
.steps { list-style: none; margin: 8px 0 10px; }
.step { display: flex; gap: 10px; padding: 6px 0; font-size: 13px; color: var(--l1); line-height: 1.5; letter-spacing: -0.005em; }
.step-n { flex-shrink: 0; width: 18px; height: 18px; border-radius: 6px; background: var(--s3); color: var(--l2); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }

/* TIP */
.tip { display: flex; gap: 9px; padding: 10px 12px; background: var(--s2); border-radius: 10px; font-size: 12.5px; line-height: 1.5; color: var(--l2); margin: 10px 0; letter-spacing: -0.005em; }
.tip-ic { color: var(--yellow); flex-shrink: 0; margin-top: 2px; }
.tip-ic svg { width: 13px; height: 13px; }

/* ROW BUTTONS (tutorial, alts) */
.rowbtn { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: var(--s2); border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--l1); margin-bottom: 7px; width: 100%; transition: transform 0.18s var(--quick), background 0.18s; letter-spacing: -0.005em; }
.rowbtn:active { transform: scale(0.97); background: var(--s3); }
.rowbtn-ic { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rowbtn-ic.red { background: var(--red); color: #fff; }
.rowbtn-ic.neutral { background: var(--s3); color: var(--l2); }
.rowbtn-ic svg { width: 12px; height: 12px; }
.rowbtn-txt { flex: 1; }
.rowbtn-chev { color: var(--l3); display: flex; transition: transform 0.2s; }
.rowbtn-chev.open { transform: rotate(180deg); }

.alt-list { padding: 4px 0 2px; display: flex; flex-direction: column; gap: 4px; }
.alt-it { display: flex; align-items: center; gap: 10px; padding: 10px 12px 10px 14px; background: transparent; font-size: 13px; color: var(--l2); letter-spacing: -0.005em; }
.alt-it:active { background: var(--s2); }
.alt-it .alt-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--l4); }
.alt-it .alt-name { flex: 1; }
.alt-it .alt-go { color: var(--l3); }
.alt-it .alt-go svg { width: 11px; height: 11px; }

/* SETS TABLE */
.sets { margin-top: 12px; }
.sets-hd { display: grid; grid-template-columns: 30px 1fr 1fr 36px; gap: 12px; padding: 0 10px 10px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; color: var(--l3); }
.setrow { display: grid; grid-template-columns: 30px 1fr 1fr 36px; gap: 12px; align-items: center; padding: 11px 10px; background: var(--s2); border-radius: 10px; margin-bottom: 5px; transition: all 0.15s; }
.setrow:active { background: var(--s3); }
.setrow.done { background: var(--red-soft); }
.setrow.pr { border: 0.5px solid var(--red); }
.set-idx { font-size: 13px; font-weight: 700; color: var(--l2); text-align: center; font-variant-numeric: tabular-nums; }
.setrow.done .set-idx { color: var(--red); }
.set-v { font-size: 15px; font-weight: 600; letter-spacing: -0.015em; font-variant-numeric: tabular-nums; color: var(--l1); }
.set-v.empty { color: var(--l4); font-weight: 500; }
.set-v .small { font-size: 10px; color: var(--l3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 3px; }
.set-check { width: 22px; height: 22px; border-radius: 50%; border: 1.2px solid var(--l4); display: flex; align-items: center; justify-content: center; justify-self: end; transition: background 0.25s var(--spring), border-color 0.25s var(--spring), transform 0.3s var(--spring); }
.setrow.done .set-check { background: var(--red); border-color: var(--red); transform: scale(1.05); }
.set-check svg { width: 11px; height: 11px; color: #fff; }
.pr-tag { display: inline-flex; align-items: center; font-size: 9px; font-weight: 800; letter-spacing: 0.08em; padding: 2px 5px; background: var(--red); color: #fff; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

.last-ref { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--l3); padding: 6px 10px; background: var(--s2); border-radius: 8px; margin-bottom: 10px; font-weight: 500; letter-spacing: -0.005em; }
.last-ref svg { width: 11px; height: 11px; }

/* DONE BANNER */
.done-banner { padding: 16px; background: var(--s1); border: 0.5px solid var(--red-border); border-radius: 16px; margin: 0 20px 14px; display: flex; align-items: center; gap: 14px; }
.done-icon { width: 42px; height: 42px; border-radius: 14px; background: var(--red-soft); color: var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.done-icon svg { width: 20px; height: 20px; stroke-width: 2; }
.done-t { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.done-s { font-size: 13px; color: var(--l2); margin-top: 2px; letter-spacing: -0.005em; }

/* GOAL CARD */
.goal-card { margin: 0 20px 20px; padding: 20px; background: var(--s1); border: 0.5px solid var(--sep); border-radius: 20px; }
.goal-h { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.goal-h-ic { color: var(--red); display: flex; }
.goal-h-ic svg { width: 15px; height: 15px; }
.goal-t { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--red); }
.goal-heading { font-size: 20px; font-weight: 700; letter-spacing: -0.025em; margin-top: 8px; margin-bottom: 6px; }
.goal-desc { font-size: 13.5px; color: var(--l2); line-height: 1.5; letter-spacing: -0.005em; }
.goal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 0.5px solid var(--sep); }
.goal-cell-lbl { font-size: 10px; color: var(--l3); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
.goal-cell-v { font-size: 18px; font-weight: 800; letter-spacing: -0.025em; margin-top: 4px; font-variant-numeric: tabular-nums; }
.goal-cell-v.accent { color: var(--red); }

/* MACRO RINGS GRID (Fuel tab) */
.macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
.macro-card { background: var(--s1); border: 0.5px solid var(--sep); border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 14px; }
.macro-ring { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
.macro-ring svg { transform: rotate(-90deg); }
.macro-ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.macro-info { min-width: 0; }
.macro-lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--l3); font-weight: 600; margin-bottom: 3px; }
.macro-v { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.macro-v .of { color: var(--l3); font-size: 12px; font-weight: 500; margin-left: 1px; }

/* MEAL SECTION */
.meal-hd { display: flex; align-items: center; justify-content: space-between; padding: 6px 2px 10px; margin-top: 8px; }
.meal-hd-l { display: flex; align-items: center; gap: 8px; }
.meal-hd-ic { width: 20px; height: 20px; color: var(--l3); display: flex; align-items: center; justify-content: center; }
.meal-hd-ic svg { width: 14px; height: 14px; stroke-width: 1.6; }
.meal-t { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--l1); }
.meal-k { font-size: 11px; color: var(--l3); font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; text-transform: uppercase; }

/* DIET ITEM */
.di { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--s1); border: 0.5px solid var(--sep); border-radius: 14px; margin-bottom: 6px; transition: all 0.15s; }
.di:active { background: var(--s2); }
.di.done { opacity: 0.48; }
.di-info { flex: 1; min-width: 0; }
.di-n { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.3; }
.di.done .di-n { text-decoration: line-through; text-decoration-color: var(--l4); }
.di-m { font-size: 11px; color: var(--red); margin-top: 2px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.di-note { font-size: 11px; color: var(--l3); margin-top: 2px; letter-spacing: -0.005em; }
.di-chk { width: 22px; height: 22px; border-radius: 50%; border: 1.2px solid var(--l4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s var(--spring); }
.di.done .di-chk { background: var(--red); border-color: var(--red); }
.di-chk svg { width: 11px; height: 11px; color: #fff; }

/* BREAKFAST VARIANT PILLS */
.bf-pills { display: flex; gap: 6px; overflow-x: auto; padding: 0 20px 12px; }
.bf-pills::-webkit-scrollbar { display: none; }

.wt-tr.dn { color: var(--green); }

/* CHART */
.chart-card { margin: 0 20px 18px; padding: 18px; background: var(--s1); border: 0.5px solid var(--sep); border-radius: 20px; }

.chart-t { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.chart-seg { display: flex; gap: 2px; background: var(--s3); padding: 2px; border-radius: 8px; }
.chart-seg button { padding: 5px 10px; font-size: 11px; font-weight: 600; color: var(--l3); border-radius: 6px; letter-spacing: -0.005em; transition: all 0.15s; }
.chart-seg button.on { background: var(--l1); color: var(--bg); }
.chart-svg { width: 100%; height: 150px; display: block; }
.chart-empty { padding: 30px 10px; text-align: center; color: var(--l3); font-size: 13px; }

/* PHOTO GRID */
.ph-hd { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 12px; }
.ph-hd-l { font-size: 22px; font-weight: 700; letter-spacing: -0.025em; }
.ph-add { padding: 8px 14px; background: var(--s2); border: 0.5px solid var(--sep); color: var(--l1); border-radius: 999px; font-size: 13px; font-weight: 500; letter-spacing: -0.005em; display: flex; align-items: center; gap: 6px; transition: opacity 0.12s; }

.empty-st { padding: 40px 20px; text-align: center; background: var(--s1); border: 0.5px dashed var(--sep2); border-radius: 18px; margin: 0 20px 18px; }

.stat-g { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 18px; }
.stat-b { background: var(--s1); border: 0.5px solid var(--sep); border-radius: 18px; padding: 16px; }

.sheet { width: 100%; max-width: 500px; max-height: 90vh; background: var(--s1); border-top-left-radius: 28px; border-top-right-radius: 28px; padding: 12px 20px calc(24px + var(--sb)); overflow-y: auto; animation: sheetUp 0.42s var(--spring); border-top: 0.5px solid var(--sep); will-change: transform; }

.notes-in { width: 100%; background: var(--s2); border: 0.5px solid var(--sep); border-radius: 12px; padding: 12px; color: var(--l1); font-size: 13px; resize: none; font-family: inherit; letter-spacing: -0.005em; margin-top: 8px; transition: border 0.15s; }

.stagger > *:nth-child(1) { animation-delay: 0.0s; }

.stagger > *:nth-child(5) { animation-delay: 0.20s; }
.stagger > *:nth-child(6) { animation-delay: 0.25s; }
.stagger > *:nth-child(7) { animation-delay: 0.30s; }

/* BIG PHOTO VIEW */
.ph-full { width: 100%; border-radius: 16px; display: block; }
</style>

const KEY_V5 = "train_v5";
const KEY_V4 = "grind_v4";
const DB_NAME = "grind_db";

let S = {
  tab: "today", activeWO: "upper1", expandedEx: null, expandedAlts: null, chartRange: 30,
  log: {}, meals: {}, breakfast: {}, skipped: {}, weights: [], photos: [], notes: {}
};

function todayKey(){ return new Date().toISOString().split("T")[0]; }
function dayIdx(){ const d=new Date().getDay(); return d===0?6:d-1; }
function dk(d){ return d.toISOString().split("T")[0]; }
function fmtDate(dt, opts){ return new Date(dt).toLocaleDateString("en-IN", opts||{day:"numeric",month:"short"}); }

function loadStore(){
  try {
    let raw = localStorage.getItem(KEY_V5);
    if (!raw) raw = localStorage.getItem(KEY_V4);  // migrate
    if (raw){
      const d = JSON.parse(raw);
      Object.assign(S, {
        log: d.log||{}, meals: d.meals||{}, breakfast: d.breakfast||{},
        skipped: d.skipped||{}, weights: d.weights||[], photos: d.photos||[], notes: d.notes||{}
      });
    }
  } catch(e){ console.error(e); }
  if (!S.breakfast[todayKey()]) S.breakfast[todayKey()] = "eggs";
}

function persist(){
  try {
    localStorage.setItem(KEY_V5, JSON.stringify({
      log: S.log, meals: S.meals, breakfast: S.breakfast,
      skipped: S.skipped, weights: S.weights, photos: S.photos, notes: S.notes
    }));
  } catch(e){ console.error(e); }
}

// IndexedDB
let _db = null;
function openDB(){
  return new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => rej(req.error);
    req.onsuccess = () => { _db = req.result; res(_db); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("photos")) db.createObjectStore("photos", {keyPath: "id"});
    };
  });
}
async function savePhotoFull(id, dataURL){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").put({id, data: dataURL});
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function getPhotoFull(id){
  const db = await openDB();
  return new Promise((res) => {
    const req = db.transaction("photos").objectStore("photos").get(id);
    req.onsuccess = () => res(req.result ? req.result.data : null);
    req.onerror = () => res(null);
  });
}
async function deletePhotoFull(id){
  const db = await openDB();
  return new Promise((res) => {
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}

function compressImage(file, maxW, q){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = img.width * scale, h = img.height * scale;
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        res(c.toDataURL("image/jpeg", q));
      };
      img.onerror = rej; img.src = e.target.result;
    };
    r.onerror = rej; r.readAsDataURL(file);
  });
}

// COMPUTED
// ═══════════════════════════════════════════════════════════════════════════
function setData(wk, ei, si, date){ const d=date||todayKey(); return S.log?.[d]?.[wk]?.[ei]?.[si]||null; }
function setExLog(wk, ei, date){ const d=date||todayKey(); return S.log?.[d]?.[wk]?.[ei]||{}; }
function woProg(wk, date){
  const d=date||todayKey();
  const total=W[wk].exercises.reduce((a,e)=>a+e.sets,0);
  const done=W[wk].exercises.reduce((a,e,ei)=>{ const el=setExLog(wk,ei,d); return a+Object.values(el).filter(s=>s&&s.done).length; },0);
  return {done, total, pct: total?(done/total)*100:0};
}
function exProg(wk, ei, date){ const el=setExLog(wk,ei,date); return Object.values(el).filter(s=>s&&s.done).length; }

function lastEntry(wk, ei, si){
  const dates=Object.keys(S.log).filter(d=>d<todayKey()).sort().reverse();
  for (const d of dates){ const e=S.log[d]?.[wk]?.[ei]?.[si]; if(e&&e.done) return {...e,date:d}; }
  return null;
}
function lastAnyForEx(wk, ei){
  const dates=Object.keys(S.log).filter(d=>d<=todayKey()).sort().reverse();
  for (const d of dates){
    const sets=S.log[d]?.[wk]?.[ei]; if(!sets) continue;
    const sis=Object.keys(sets).sort((a,b)=>b-a);
    for (const si of sis){ if(sets[si]&&sets[si].done) return {...sets[si],date:d}; }
  }
  return null;
}
function isPR(wk, ei, w, r){
  let best=0;
  Object.entries(S.log).forEach(([d, wks])=>{
    const sets=wks?.[wk]?.[ei]; if(!sets) return;
    Object.values(sets).forEach(s=>{ if(s&&s.done&&s.r>=r&&s.w>best) best=s.w; });
  });
  return w>best;
}
function bfVariant(d){ return BREAKFAST_VARIANTS[S.breakfast[d||todayKey()]||"eggs"]; }
function totalMacros(d){
  const date=d||todayKey();
  let cal=0,p=0,c=0,f=0;
  const bf=bfVariant(date);
  if (S.meals[`${date}_${bf.id}`]){ cal+=bf.kcal; p+=bf.p; c+=bf.c; f+=bf.f; }
  MEALS.forEach(m=>m.items.forEach(it=>{
    if (S.meals[`${date}_${it.id}`]){ cal+=it.kcal; p+=it.p; c+=it.c; f+=it.f; }
  }));
  return {cal, p, c, f};
}
function streakCount(){
  let streak=0;
  for (let i=1; i<=90; i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const date=dk(d);
    const di=(d.getDay()===0)?6:d.getDay()-1;
    const wk=SCHED[di].workout;
    if (wk==="rest"){ streak++; continue; }
    if (S.skipped[date]) break;
    const p=woProg(wk,date);
    if (p.pct>=75) streak++; else break;
  }
  return streak;
}
function weightTrend(){
  if (S.weights.length<2) return null;
  const sorted=[...S.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1];
  const weekAgo=new Date(latest.date); weekAgo.setDate(weekAgo.getDate()-7);
  let ref=sorted.find(w=>new Date(w.date)>=weekAgo);
  if (!ref||ref===latest) ref=sorted[Math.max(0,sorted.length-2)];
  return {latest:latest.kg, delta:(latest.kg-ref.kg).toFixed(1), refDate:ref.date};
}
function totalVolumeWeek(){
  let vol=0, sets=0;
  const today=new Date();
  for (let i=0; i<7; i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const logs=S.log[dk(d)]; if(!logs) continue;
    Object.values(logs).forEach(wks=>Object.values(wks).forEach(exs=>Object.values(exs).forEach(s=>{
      if(s&&s.done){ vol+=(s.w||0)*(s.r||0); sets++; }
    })));
  }
  return {vol,sets};
}
function totalVolumeMonth(){
  let vol=0, sets=0;
  const today=new Date();
  for (let i=0; i<30; i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const logs=S.log[dk(d)]; if(!logs) continue;
    Object.values(logs).forEach(wks=>Object.values(wks).forEach(exs=>Object.values(exs).forEach(s=>{
      if(s&&s.done){ vol+=(s.w||0)*(s.r||0); sets++; }
    })));
  }
  return {vol,sets};
}
function topPRs(limit){
  const prs={};
  Object.entries(S.log).forEach(([date, wks])=>{
    Object.entries(wks).forEach(([wk, exs])=>{
      Object.entries(exs).forEach(([ei, sets])=>{
        const exName=W[wk]?.exercises[ei]?.name; if(!exName) return;
        Object.values(sets).forEach(s=>{
          if (s&&s.done&&s.w>0){
            if(!prs[exName]||s.w>prs[exName].w) prs[exName]={w:s.w,r:s.r,date};
          }
        });
      });
    });
  });
  return Object.entries(prs).sort((a,b)=>b[1].w-a[1].w).slice(0, limit||5);
}

// APPLE-STYLE TRIPLE RING
// ═══════════════════════════════════════════════════════════════════════════
function tripleRing(p1, p2, p3){
  // p1 = outer, p2 = middle, p3 = inner
  const size = 140, cx = 70, cy = 70;
  const stroke = 14, gap = 4;
  const r1 = 60, r2 = r1 - stroke - gap, r3 = r2 - stroke - gap;
  const mk = (r, pct, color) => {
    const c = 2*Math.PI*r;
    const off = c*(1-Math.min(pct,100)/100);
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}20" stroke-width="${stroke}"/>
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
              stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
              style="transition: stroke-dashoffset 0.8s var(--spring)"/>`;
  };
  return `<svg width="${size}" height="${size}" style="transform: rotate(-90deg)">
    ${mk(r1, p1, '#FF375F')}
    ${mk(r2, p2, '#FFFFFF')}
    ${mk(r3, p3, '#FFD60A')}
  </svg>`;
}

function simpleRing(pct, color, size){
  const s=size||44; const r=(s/2)-3.5; const c=2*Math.PI*r;
  return `<svg width="${s}" height="${s}">
    <circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
    <circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-Math.min(pct,100)/100)}"
      stroke-linecap="round" style="transition:stroke-dashoffset 0.7s var(--spring)"/>
  </svg>`;
}

// LINE CHART
// ═══════════════════════════════════════════════════════════════════════════
function lineChart(data, color){
  color = color || '#FF375F';
  const w = 320, h = 150, pad = {t: 14, r: 10, b: 20, l: 32};
  if (!data || data.length < 2) return `<div class="chart-empty">Log at least 2 data points to see the trend.</div>`;
  const ys = data.map(d=>d.v);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rY = Math.max(maxY - minY, 0.5);
  const x = i => pad.l + (i / (data.length - 1)) * (w - pad.l - pad.r);
  const y = v => pad.t + (1 - (v - minY) / rY) * (h - pad.t - pad.b);

  let path = "";
  data.forEach((d, i) => {
    path += (i === 0 ? "M" : "L") + x(i).toFixed(1) + "," + y(d.v).toFixed(1);
  });
  const areaPath = path + `L${x(data.length-1)},${h-pad.b} L${x(0)},${h-pad.b} Z`;
  const gradId = "g" + Math.random().toString(36).slice(2,7);

  let gridLines = "";
  for (let i = 0; i < 4; i++){
    const gy = pad.t + (i / 3) * (h - pad.t - pad.b);
    const gv = maxY - (i / 3) * rY;
    gridLines += `<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
    gridLines += `<text x="${pad.l-6}" y="${gy+3}" font-size="9" fill="rgba(255,255,255,0.36)" text-anchor="end" font-family="Inter" font-weight="500">${gv.toFixed(1)}</text>`;
  }
  let xLbls = "";
  const step = Math.max(1, Math.floor(data.length / 4));
  for (let i = 0; i < data.length; i += step){
    xLbls += `<text x="${x(i)}" y="${h-5}" font-size="9" fill="rgba(255,255,255,0.36)" text-anchor="middle" font-family="Inter" font-weight="500">${data[i].label}</text>`;
  }
  let dots = "";
  data.forEach((d,i) => { dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(d.v).toFixed(1)}" r="3" fill="${color}" stroke="#000" stroke-width="1.5"/>`; });

  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#${gradId})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLbls}
  </svg>`;
}

// WORKOUT SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function renderWorkout(){
  const tk = todayKey();
  const aw = S.activeWO;
  const ww = W[aw];
  const prog = woProg(aw);

  let h = `<header class="hdr">
    <div class="hdr-top">
      <div class="hdr-date">Today's Session</div>
      <div style="font-size:13px;color:var(--l2);font-weight:600" class="tnum">${prog.done} / ${prog.total}</div>
    </div>
    <h1 class="hdr-h1">${ww.label}</h1>
  </header>`;

  // Workout selector
  h += `<div class="wo-seg stagger">`;
  Object.entries(W).forEach(([k,w]) => {
    h += `<button class="wo-pill ${S.activeWO===k?'on':''}" onclick="setWO('${k}')">${w.short}</button>`;
  });
  h += `</div>`;

  // Progress bar
  h += `<div class="progbar-wrap">
    <div class="progbar"><div class="progbar-f" style="width:${prog.pct}%"></div></div>
  </div>`;

  // Done banner
  if (prog.pct === 100) {
    h += `<div class="done-banner fade-in">
      <div class="done-icon">${ic('check',20)}</div>
      <div>
        <div class="done-t">Session Complete</div>
        <div class="done-s">${prog.total} sets logged · great work.</div>
      </div>
    </div>`;
  }

  // Exercises
  h += `<div class="ex-list stagger">`;
  ww.exercises.forEach((ex, ei) => {
    const expanded = S.expandedEx === `${aw}_${ei}`;
    const altsOpen = S.expandedAlts === `${aw}_${ei}`;
    const done = exProg(aw, ei) === ex.sets;
    const exLog = setExLog(aw, ei);
    const doneCount = exProg(aw, ei);

    h += `<div class="ex ${done?'done':''}">
      <div class="ex-head" onclick="toggleEx('${aw}_${ei}')">
        <div class="ex-num">${ei+1}</div>
        <div class="ex-info">
          <div class="ex-nm">${ex.name}</div>
          <div class="ex-meta">${ex.sets} × ${ex.reps} · ${Math.round(ex.rest/60*10)/10}min rest</div>
        </div>
        <div class="ex-right">
          <div class="ex-count ${doneCount>0&&!done?'active':''}">${doneCount}/${ex.sets}</div>
          <div class="ex-chev ${expanded?'open':''}">${ic('chevDown',14)}</div>
        </div>
      </div>`;

    if (expanded){
      h += `<div class="ex-body">
        <div class="ex-muscle">${ic('target',11)} ${ex.muscle}</div>
        <ol class="steps">${ex.steps.map((s,i)=>`<li class="step"><span class="step-n">${i+1}</span><span>${s}</span></li>`).join("")}</ol>
        <div class="tip"><span class="tip-ic">${ic('lightbulb',13)}</span><span>${ex.tip}</span></div>

        <a href="${ex.yt}" target="_blank" rel="noopener">
          <button class="rowbtn">
            <span class="rowbtn-ic red">${ic('play',12)}</span>
            <span class="rowbtn-txt">Watch Tutorial</span>
            <span class="rowbtn-chev">${ic('arrowRight',12)}</span>
          </button>
        </a>

        <button class="rowbtn" onclick="toggleAlts('${aw}_${ei}')">
          <span class="rowbtn-ic neutral">${ic('refresh',12)}</span>
          <span class="rowbtn-txt">${ex.alts.length} Alternatives</span>
          <span class="rowbtn-chev ${altsOpen?'open':''}">${ic('chevDown',12)}</span>
        </button>
        ${altsOpen ? `<div class="alt-list">${ex.alts.map(a => `
          <a href="${a.u}" target="_blank" rel="noopener" class="alt-it">
            <span class="alt-dot"></span>
            <span class="alt-name">${a.n}</span>
            <span class="alt-go">${ic('play',11)}</span>
          </a>`).join("")}</div>` : ''}

        <div class="sets">
          <div class="sets-hd">
            <div>Set</div>
            <div>Weight</div>
            <div>Reps</div>
            <div></div>
          </div>`;
      for (let si = 0; si < ex.sets; si++){
        const s = exLog[si];
        const isDone = s && s.done;
        const showPR = s && s.pr;
        const last = lastEntry(aw, ei, si);
        h += `<div class="setrow ${isDone?'done':''}" onclick="openSetSheet('${aw}',${ei},${si})">
          <div class="set-idx">${si+1}</div>
          <div class="set-v ${isDone?'':'empty'}">${isDone ? s.w : (last ? last.w : '—')}${isDone?'':'<span class="small">last</span>'}</div>
          <div class="set-v ${isDone?'':'empty'}">${isDone ? (s.r + (showPR ? '<span class="pr-tag">PR</span>' : '')) : (last ? last.r : '—')}${isDone?'':'<span class="small">last</span>'}</div>
          <div class="set-check">${isDone ? ic('check',11) : ''}</div>
        </div>`;
      }
      h += `</div>`;

      // Notes after completion
      const noteKey = `${tk}_${aw}_${ei}`;
      const noteVal = S.notes[noteKey] || '';
      if (done) {
        h += `<div style="margin-top:14px">
          <div style="font-size:11px;color:var(--l3);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px">Session Note</div>
          <textarea class="notes-in" rows="2" placeholder="How did it feel? Form cues?" onchange="saveNote('${noteKey}',this.value)">${noteVal}</textarea>
        </div>`;
      }

      h += `</div>`;
    }
    h += `</div>`;
  });
  h += `</div>`;

  // Skip/unskip
  const isSkipped = !!S.skipped[tk];
  const di2 = dayIdx();
  const todayIsThisWo = SCHED[di2].workout === aw;
  if (todayIsThisWo) {
    h += `<div style="padding:22px 20px">`;
    if (!isSkipped) h += `<button class="bbt danger" onclick="skipDay()">Skip Today's Session</button>`;
    else h += `<button class="bbt accent" onclick="unskipDay()">Undo Skip</button>`;
    h += `</div>`;
  }

  return h;
}

// BODY SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function renderBody(){
  const wt = weightTrend();
  const sorted = [...S.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const range = S.chartRange;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - range);
  const recentWt = sorted.filter(w => new Date(w.date) >= cutoff);
  const chartData = recentWt.map(w => ({v: w.kg, label: fmtDate(w.date, {day:"numeric",month:"short"})}));
  const photosSorted = [...S.photos].sort((a,b) => b.date.localeCompare(a.date));

  let h = `<header class="hdr">
    <div class="hdr-top">
      <div class="hdr-date">Track & Compare</div>
    </div>
    <h1 class="hdr-h1">Body</h1>
  </header>`;

  // WEIGHT HERO
  if (wt){
    const dir = parseFloat(wt.delta) > 0.1 ? "up" : parseFloat(wt.delta) < -0.1 ? "dn" : "flat";
    h += `<div class="wt-hero fade-in">
      <div class="wt-lbl">Current Weight</div>
      <div class="wt-big"><span class="wt-n tnum">${wt.latest}</span><span class="wt-u">kg</span></div>
      <div class="wt-tr ${dir}">${dir==='up'?ic('arrowUp',12):dir==='dn'?ic('arrowDn',12):''} ${Math.abs(parseFloat(wt.delta)).toFixed(1)}kg <span style="color:var(--l3);font-weight:500">since ${fmtDate(wt.refDate)}</span></div>
      <button class="wt-add" onclick="openWeightSheet()">${ic('plus',14)}</button>
    </div>`;
  } else {
    h += `<div class="wt-hero fade-in">
      <div class="wt-lbl">Current Weight</div>
      <div style="font-size:18px;color:var(--l3);font-weight:500;margin-top:6px">No data yet — tap + to log</div>
      <button class="wt-add" onclick="openWeightSheet()">${ic('plus',14)}</button>
    </div>`;
  }

  // CHART
  h += `<div class="chart-card">
    <div class="chart-hd">
      <div class="chart-t">Weight Trend</div>
      <div class="chart-seg">
        <button class="${range===7?'on':''}" onclick="setChartRange(7)">7D</button>
        <button class="${range===30?'on':''}" onclick="setChartRange(30)">30D</button>
        <button class="${range===90?'on':''}" onclick="setChartRange(90)">90D</button>
      </div>
    </div>
    ${lineChart(chartData, '#FFFFFF')}
  </div>`;

  // PHOTOS
  h += `<div class="ph-hd">
    <div class="ph-hd-l">Progress Photos</div>
    <button class="ph-add" onclick="openPhotoSheet()">${ic('plus',12)}<span>Add</span></button>
  </div>`;

  if (photosSorted.length === 0){
    h += `<div class="empty-st">
      <div class="empty-ic">${ic('camera',20)}</div>
      <div class="empty-t">No photos yet</div>
      <div class="empty-s">Take one every Sunday — same lighting, same pose.<br>Progress shows up monthly, not daily.</div>
    </div>`;
  } else {
    h += `<div class="ph-grid">`;
    photosSorted.forEach(p => {
      h += `<div class="ph-item" onclick="viewPhoto('${p.id}')">
        <img src="${p.thumb}" alt="${p.date}"/>
        <div class="ph-d">${fmtDate(p.date, {day:"numeric",month:"short"})}</div>
      </div>`;
    });
    h += `</div>`;
    if (photosSorted.length >= 2){
      h += `<div style="padding:0 20px 18px">
        <button class="bbt ghost" onclick="openComparePicker()">${ic('compare',14)} Compare Photos</button>
      </div>`;
    }
  }

  // Weight history
  if (sorted.length > 0){
    h += `<div class="sec">
      <div class="sec-sub" style="margin-bottom:10px">Recent Entries</div>`;
    [...sorted].reverse().slice(0, 5).forEach(w => {
      h += `<div class="wt-entry">
        <div class="wt-entry-d">${fmtDate(w.date,{weekday:"short",day:"numeric",month:"short"})}</div>
        <div class="wt-entry-v tnum">${w.kg}<span class="u">kg</span></div>
      </div>`;
    });
    h += `</div>`;
  }

  return h;
}

// STATS SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function renderStats(){
  const streak = streakCount();
  const wkVol = totalVolumeWeek();
  const moVol = totalVolumeMonth();
  const prs = topPRs(5);

  let h = `<header class="hdr">
    <div class="hdr-top">
      <div class="hdr-date">Progress & Records</div>
    </div>
    <h1 class="hdr-h1">Stats</h1>
  </header>`;

  h += `<div class="stat-g stagger">
    <div class="stat-b">
      <div class="stat-b-hd">${ic('flame',13)}<span>Streak</span></div>
      <div class="stat-b-v tnum">${streak}<span class="u">days</span></div>
      <div class="stat-b-s">Don't break the chain</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-hd">${ic('train',13)}<span>Week Sets</span></div>
      <div class="stat-b-v tnum">${wkVol.sets}</div>
      <div class="stat-b-s">${(wkVol.vol/1000).toFixed(1)}t · last 7 days</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-hd">${ic('volume',13)}<span>Month Volume</span></div>
      <div class="stat-b-v tnum">${(moVol.vol/1000).toFixed(1)}<span class="u">t</span></div>
      <div class="stat-b-s">${moVol.sets} sets · 30 days</div>
    </div>
    <div class="stat-b">
      <div class="stat-b-hd">${ic('trophy',13)}<span>PRs Set</span></div>
      <div class="stat-b-v tnum">${prs.length}</div>
      <div class="stat-b-s">lifts tracked</div>
    </div>
  </div>`;

  // Heatmap
  h += `<div class="hm-card">
    <div class="chart-hd">
      <div class="chart-t">Consistency · 8 Weeks</div>
    </div>
    <div class="hm-grid">`;
  const cells = [];
  const today = new Date();
  for (let i = 55; i >= 0; i--){
    const d = new Date(today); d.setDate(today.getDate() - i);
    const date = dk(d);
    const di2 = (d.getDay() === 0) ? 6 : d.getDay() - 1;
    const wk = SCHED[di2].workout;
    let cls = "";
    if (wk === "rest") cls = "";
    else if (S.skipped[date]) cls = "skip";
    else {
      const p = woProg(wk, date);
      if (p.pct >= 100) cls = "l4";
      else if (p.pct >= 75) cls = "l3";
      else if (p.pct >= 40) cls = "l2";
      else if (p.pct > 0) cls = "l1";
    }
    cells.push(cls);
  }
  cells.forEach(c => h += `<div class="hm-c ${c}"></div>`);
  h += `</div>
    <div class="hm-leg">
      <span>Less</span>
      <div class="hm-c"></div>
      <div class="hm-c l1"></div>
      <div class="hm-c l2"></div>
      <div class="hm-c l3"></div>
      <div class="hm-c l4"></div>
      <span>More</span>
    </div>
  </div>`;

  // PRs
  if (prs.length > 0){
    h += `<div style="padding:0 20px"><div class="sec-sub" style="margin-bottom:10px">Personal Records</div></div>
    <div class="pr-list stagger">`;
    prs.forEach(([name, d], i) => {
      h += `<div class="pr-row">
        <div class="pr-rank">${i+1}</div>
        <div class="pr-nm">${name}<small>${d.r} reps · ${fmtDate(d.date)}</small></div>
        <div class="pr-v tnum">${d.w}<span class="u">kg</span></div>
      </div>`;
    });
    h += `</div>`;
  } else {
    h += `<div class="empty-st">
      <div class="empty-ic">${ic('trophy',20)}</div>
      <div class="empty-t">No PRs yet</div>
      <div class="empty-s">Log sets with weight and reps to start tracking records.</div>
    </div>`;
  }

  // Exercise progression
  const exOptions = new Set();
  Object.values(S.log).forEach(wks => Object.entries(wks).forEach(([wk, exs]) => Object.keys(exs).forEach(ei => {
    if (W[wk]?.exercises[ei]?.name) exOptions.add(`${wk}|${ei}|${W[wk].exercises[ei].name}`);
  })));
  if (exOptions.size > 0){
    const selected = S._selectedEx || [...exOptions][0];
    const [wk, ei] = selected.split("|");
    const series = [];
    Object.entries(S.log).sort().forEach(([date, wks]) => {
      const sets = wks?.[wk]?.[ei]; if (!sets) return;
      let maxW = 0;
      Object.values(sets).forEach(s => { if (s && s.done && s.w > maxW) maxW = s.w; });
      if (maxW > 0) series.push({v: maxW, label: fmtDate(date, {day:"numeric",month:"short"})});
    });
    h += `<div class="chart-card">
      <div class="chart-hd">
        <div class="chart-t">Lift Progression</div>
      </div>
      <select class="sel" onchange="selectEx(this.value)">
        ${[...exOptions].map(o => {
          const n = o.split("|")[2];
          return `<option value="${o}" ${o===selected?'selected':''}>${n}</option>`;
        }).join("")}
      </select>
      ${lineChart(series, '#FF375F')}
    </div>`;
  }

  return h;
}

// SET LOGGER
let _sheetSet = null;
function openSetSheet(wk, ei, si){
  const ex = W[wk].exercises[ei];
  const cur = setData(wk, ei, si);
  const lastSameSet = lastEntry(wk, ei, si);
  const lastAny = lastAnyForEx(wk, ei);
  let w = cur?.w ?? lastSameSet?.w ?? lastAny?.w ?? 20;
  let r = cur?.r ?? lastSameSet?.r ?? lastAny?.r ?? 8;
  _sheetSet = {wk, ei, si, w, r};

  const lastRef = lastSameSet || lastAny;

  const body = `
    <div class="sheet-hd">
      <div>
        <div class="sheet-ovl">Set ${si+1} · ${ex.reps} reps</div>
        <div class="sheet-t">${ex.name}</div>
      </div>
      <button class="sheet-x" onclick="closeSheet()">${ic('x',11)}</button>
    </div>
    ${lastRef ? `<div class="last-ref">${ic('clock',11)} Last: ${lastRef.w}kg × ${lastRef.r} · ${fmtDate(lastRef.date)}</div>` : ''}
    <div class="stp-row">
      <div class="stp-b">
        <div class="stp-l">Weight</div>
        <div class="stp-c">
          <button class="stp-bt" onclick="adjSet('w',-2.5)">${ic('minus',14)}</button>
          <div class="stp-v tnum" id="sv-w">${w.toFixed(1).replace('.0','')}</div>
          <button class="stp-bt" onclick="adjSet('w',2.5)">${ic('plus',14)}</button>
        </div>
        <div class="stp-u">kg</div>
      </div>
      <div class="stp-b">
        <div class="stp-l">Reps</div>
        <div class="stp-c">
          <button class="stp-bt" onclick="adjSet('r',-1)">${ic('minus',14)}</button>
          <div class="stp-v tnum" id="sv-r">${r}</div>
          <button class="stp-bt" onclick="adjSet('r',1)">${ic('plus',14)}</button>
        </div>
        <div class="stp-u">reps</div>
      </div>
    </div>
    <div class="qrow">
      <button class="qbt" onclick="adjSet('w',-0.5)">−0.5</button>
      <button class="qbt" onclick="adjSet('w',0.5)">+0.5</button>
      <button class="qbt" onclick="adjSet('w',-5)">−5kg</button>
      <button class="qbt" onclick="adjSet('w',5)">+5kg</button>
    </div>
    ${lastRef ? `<div class="qrow two">
      <button class="qbt" onclick="setSetValues(${lastRef.w},${lastRef.r})">Copy Last</button>
      <button class="qbt accent" onclick="setSetValues(${lastRef.w+2.5},${lastRef.r})">+2.5kg Progressive</button>
    </div>` : ''}
    <button class="bbt accent" onclick="saveSet()">${cur?.done ? 'Update Set' : 'Log Set'}</button>
    ${cur?.done ? `<button class="bbt danger" style="margin-top:8px" onclick="unlogSet()">Remove Set</button>` : ''}
  `;
  openSheet(body);
}
function adjSet(key, d){
  if (!_sheetSet) return;
  if (key === "w") _sheetSet.w = Math.max(0, Math.round((_sheetSet.w + d) * 10) / 10);
  else _sheetSet.r = Math.max(0, _sheetSet.r + d);
  document.getElementById("sv-w").textContent = _sheetSet.w.toFixed(1).replace('.0','');
  document.getElementById("sv-r").textContent = _sheetSet.r;
}
function setSetValues(w, r){
  if (!_sheetSet) return;
  _sheetSet.w = w; _sheetSet.r = r;
  document.getElementById("sv-w").textContent = w.toFixed(1).replace('.0','');
  document.getElementById("sv-r").textContent = r;
}
function saveSet(){
  if (!_sheetSet) return;
  const {wk, ei, si, w, r} = _sheetSet;
  const tk = todayKey();
  if (!S.log[tk]) S.log[tk] = {};
  if (!S.log[tk][wk]) S.log[tk][wk] = {};
  if (!S.log[tk][wk][ei]) S.log[tk][wk][ei] = {};
  const pr = isPR(wk, ei, w, r);
  S.log[tk][wk][ei][si] = {w, r, done: true, pr, ts: Date.now()};
  persist();
  closeSheet();
  render();
  const rest = W[wk].exercises[ei].rest;
  startTimer(rest);
  if (pr) toast(`New PR — ${w}kg × ${r}`, "accent", "trophy");
  else toast(`Set logged · rest ${Math.round(rest/60*10)/10}min`, null, "check");
}
function unlogSet(){
  if (!_sheetSet) return;
  const {wk, ei, si} = _sheetSet;
  const tk = todayKey();
  if (S.log[tk]?.[wk]?.[ei]?.[si]){ delete S.log[tk][wk][ei][si]; persist(); }
  closeSheet();
  render();
}

// WEIGHT LOGGER
let _sheetWt = null;
function openWeightSheet(){
  const last = S.weights.length > 0 ? [...S.weights].sort((a,b)=>b.date.localeCompare(a.date))[0] : null;
  _sheetWt = {kg: last ? last.kg : 80.0};
  const body = `
    <div class="sheet-hd">
      <div>
        <div class="sheet-ovl">${fmtDate(todayKey(),{weekday:"long",day:"numeric",month:"long"})}</div>
        <div class="sheet-t">Log Weight</div>
      </div>
      <button class="sheet-x" onclick="closeSheet()">${ic('x',11)}</button>
    </div>
    ${last ? `<div class="last-ref">${ic('clock',11)} Last: ${last.kg}kg · ${fmtDate(last.date)}</div>` : ''}
    <div class="stp-row one">
      <div class="stp-b">
        <div class="stp-l">Weight</div>
        <div class="stp-c">
          <button class="stp-bt" onclick="adjWt(-0.5)">${ic('minus',14)}</button>
          <div class="stp-v tnum" id="wt-val">${_sheetWt.kg.toFixed(1)}</div>
          <button class="stp-bt" onclick="adjWt(0.5)">${ic('plus',14)}</button>
        </div>
        <div class="stp-u">kg</div>
      </div>
    </div>
    <div class="qrow">
      <button class="qbt" onclick="adjWt(-0.1)">−0.1</button>
      <button class="qbt" onclick="adjWt(0.1)">+0.1</button>
      <button class="qbt" onclick="adjWt(-1)">−1.0</button>
      <button class="qbt" onclick="adjWt(1)">+1.0</button>
    </div>
    <button class="bbt accent" onclick="saveWeight()">Save Weight</button>
  `;
  openSheet(body);
}
function adjWt(d){
  if (!_sheetWt) return;
  _sheetWt.kg = Math.max(20, Math.min(200, Math.round((_sheetWt.kg + d) * 10) / 10));
  document.getElementById("wt-val").textContent = _sheetWt.kg.toFixed(1);
}
function saveWeight(){
  if (!_sheetWt) return;
  const tk = todayKey();
  S.weights = S.weights.filter(w => w.date !== tk);
  S.weights.push({date: tk, kg: _sheetWt.kg});
  persist();
  closeSheet();
  render();
  toast(`${_sheetWt.kg.toFixed(1)}kg logged`, null, "check");
}

// PHOTO
function openPhotoSheet(){
  const input = document.getElementById("photoInput");
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      toast("Processing…");
      const thumb = await compressImage(file, 300, 0.6);
      const full = await compressImage(file, 900, 0.75);
      const id = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
      const tk = todayKey();
      await savePhotoFull(id, full);
      S.photos.push({id, date: tk, thumb});
      persist();
      input.value = "";
      render();
      if (!S.weights.some(w => w.date === tk)) setTimeout(() => openWeightSheet(), 400);
      else toast("Photo saved", null, "check");
    } catch(err){ console.error(err); toast("Failed to save photo"); }
  };
  input.click();
}
async function viewPhoto(id){
  const full = await getPhotoFull(id);
  const ph = S.photos.find(p => p.id === id);
  if (!full || !ph) { toast("Photo not found"); return; }
  const body = `
    <div class="sheet-hd">
      <div>
        <div class="sheet-ovl">${fmtDate(ph.date,{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        <div class="sheet-t">Progress Photo</div>
      </div>
      <button class="sheet-x" onclick="closeSheet()">${ic('x',11)}</button>
    </div>
    <img src="${full}" class="ph-full"/>
    <button class="bbt danger" style="margin-top:16px" onclick="deletePhoto('${id}')">Delete Photo</button>
  `;
  openSheet(body);
}
async function deletePhoto(id){
  if (!confirm("Delete this photo?")) return;
  S.photos = S.photos.filter(p => p.id !== id);
  await deletePhotoFull(id);
  persist();
  closeSheet();
  render();
  toast("Photo deleted");
}

let _comparePick = [];
function openComparePicker(){
  _comparePick = [];
  const sorted = [...S.photos].sort((a,b) => b.date.localeCompare(a.date));
  const body = `
    <div class="sheet-hd">
      <div>
        <div class="sheet-ovl">Compare</div>
        <div class="sheet-t">Pick 2 Photos</div>
      </div>
      <button class="sheet-x" onclick="closeSheet()">${ic('x',11)}</button>
    </div>
    <div style="font-size:13px;color:var(--l2);margin-bottom:14px;letter-spacing:-0.005em">Tap two photos to see them side-by-side</div>
    <div class="ph-grid" style="padding:0" id="comparePick">
      ${sorted.map(p => `<div class="ph-item" onclick="pickCompare('${p.id}',this)" style="border:2px solid transparent">
        <img src="${p.thumb}" alt="${p.date}"/>
        <div class="ph-d">${fmtDate(p.date,{day:"numeric",month:"short"})}</div>
      </div>`).join("")}
    </div>
  `;
  openSheet(body);
}
function pickCompare(id, el){
  const idx = _comparePick.indexOf(id);
  if (idx >= 0) { _comparePick.splice(idx, 1); el.style.border = "2px solid transparent"; return; }
  if (_comparePick.length >= 2) return;
  _comparePick.push(id);
  el.style.border = "2px solid var(--red)";
  if (_comparePick.length === 2) setTimeout(() => showCompare(), 250);
}
async function showCompare(){
  const [a, b] = _comparePick;
  const [fa, fb] = await Promise.all([getPhotoFull(a), getPhotoFull(b)]);
  const pa = S.photos.find(p => p.id === a);
  const pb = S.photos.find(p => p.id === b);
  const [earlyP, earlyImg, lateP, lateImg] = pa.date <= pb.date ? [pa, fa, pb, fb] : [pb, fb, pa, fa];
  const wa = S.weights.find(w => w.date === earlyP.date);
  const wb = S.weights.find(w => w.date === lateP.date);
  const body = `
    <div class="sheet-hd">
      <div class="sheet-t">Compare</div>
      <button class="sheet-x" onclick="closeSheet()">${ic('x',11)}</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div>
        <div style="font-size:10px;color:var(--l3);letter-spacing:0.08em;text-transform:uppercase;font-weight:700;margin-bottom:6px">Before</div>
        <img src="${earlyImg}" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px"/>
        <div style="margin-top:8px;font-size:13px;font-weight:600;letter-spacing:-0.01em">${fmtDate(earlyP.date,{day:"numeric",month:"short",year:"numeric"})}</div>
        ${wa?`<div style="font-size:12px;color:var(--l3);font-variant-numeric:tabular-nums">${wa.kg}kg</div>`:''}
      </div>
      <div>
        <div style="font-size:10px;color:var(--red);letter-spacing:0.08em;text-transform:uppercase;font-weight:700;margin-bottom:6px">After</div>
        <img src="${lateImg}" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px"/>
        <div style="margin-top:8px;font-size:13px;font-weight:600;letter-spacing:-0.01em">${fmtDate(lateP.date,{day:"numeric",month:"short",year:"numeric"})}</div>
        ${wb?`<div style="font-size:12px;color:var(--l3);font-variant-numeric:tabular-nums">${wb.kg}kg</div>`:''}
      </div>
    </div>
    ${wa && wb ? `<div style="padding:12px 14px;background:var(--s2);border-radius:14px;font-size:13px;text-align:center;font-weight:500">
      <span style="color:var(--l3)">Change:</span> <span style="font-weight:700;font-variant-numeric:tabular-nums">${(wb.kg-wa.kg > 0 ? '+' : '')}${(wb.kg-wa.kg).toFixed(1)}kg</span>
      <span style="color:var(--l3)"> · ${Math.round((new Date(lateP.date) - new Date(earlyP.date))/(1000*60*60*24))} days</span>
    </div>` : ''}
  `;
  openSheet(body);
}

// ═══════════════════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════════════════
let _timerInterval = null;
let _timerEnd = 0;
function startTimer(seconds){
  stopTimer();
  _timerEnd = Date.now() + seconds * 1000;
  document.getElementById("timerPill").classList.add("on");
  tickTimer();
  _timerInterval = setInterval(tickTimer, 500);
}
function tickTimer(){
  const pill = document.getElementById("timerPill");
  const txt = document.getElementById("timerTxt");
  const left = Math.max(0, Math.round((_timerEnd - Date.now()) / 1000));
  const mm = Math.floor(left / 60).toString();
  const ss = (left % 60).toString().padStart(2, "0");
  txt.textContent = mm + ":" + ss;
  if (left <= 10) pill.classList.add("warn");
  if (left === 0){
    if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
    stopTimer();
    toast("Rest complete", "accent", "check");
  }
}
function stopTimer(){
  if (_timerInterval) clearInterval(_timerInterval);
  _timerInterval = null;
  const pill = document.getElementById("timerPill");
  pill.classList.remove("on", "warn");
}

// ═══════════════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════════════
function toast(msg, variant, iconName){
  const zone = document.getElementById("toastZone");
  const t = document.createElement("div");
  t.className = "toast " + (variant || "");
  t.innerHTML = (iconName ? ic(iconName, 14) : '') + `<span>${msg}</span>`;
  zone.appendChild(t);
  setTimeout(() => {
    t.style.transition = "all 0.35s cubic-bezier(0.4, 0, 1, 1)";
    t.style.opacity = "0";
    t.style.transform = "translate(-50%, -14px) scale(0.92)";
  }, 2100);
  setTimeout(() => t.remove(), 2500);
}

// ═══════════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function setTab(t){
  S.tab = t; S.expandedEx = null; S.expandedAlts = null;
  const screen = document.getElementById("screen");
  screen.style.transition = "opacity 0.15s ease, transform 0.15s ease";
  screen.style.opacity = "0"; screen.style.transform = "translateY(4px)";
  requestAnimationFrame(() => requestAnimationFrame(() => {
    render();
    screen.style.transition = "opacity 0.3s var(--spring), transform 0.3s var(--spring)";
    screen.style.opacity = "1"; screen.style.transform = "translateY(0)";
    try { screen.scrollTop = 0; } catch(e){}
  }));
}
function setWO(k){ S.activeWO = k; S.expandedEx = null; S.expandedAlts = null; render(); }
function toggleEx(id){ S.expandedEx = S.expandedEx === id ? null : id; S.expandedAlts = null; render(); }
function toggleAlts(id){ S.expandedAlts = S.expandedAlts === id ? null : id; render(); }
function toggleMeal(id){
  const k = todayKey() + "_" + id;
  if (S.meals[k]) delete S.meals[k]; else S.meals[k] = true;
  persist(); render();
}
function setBreakfast(k){ S.breakfast[todayKey()] = k; persist(); render(); }
function skipDay(){ if (confirm("Skip today's workout?")) { S.skipped[todayKey()] = true; persist(); render(); toast("Day skipped"); } }
function unskipDay(){ delete S.skipped[todayKey()]; persist(); render(); toast("Skip undone", null, "check"); }
function resetMealsToday(){
  if (!confirm("Reset today's meal log?")) return;
  const tk = todayKey();
  Object.keys(S.meals).filter(k => k.startsWith(tk)).forEach(k => delete S.meals[k]);
  persist(); render();
}
function setChartRange(n){ S.chartRange = n; render(); }
function saveNote(k, v){ S.notes[k] = v; persist(); }
function selectEx(v){ S._selectedEx = v; render(); }

// INIT
loadStore();
render();
</script>
