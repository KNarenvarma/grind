<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Naren Grind">
<meta name="theme-color" content="#0A0A0F">
<title>Naren's Grind</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--s:#111118;--b:#1e1e2a;--t:#F0EDE8;--m:#555;--m2:#888;
  --or:#FF6B35;--te:#4ECDC4;--pu:#A855F7;--am:#F59E0B;--gr:#10B981;--re:#EF4444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif}
#app{height:100%;display:flex;flex-direction:column}
.scr{flex:1;overflow-y:auto;padding-bottom:84px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}

/* HEADER */
.hdr{padding:50px 16px 12px;background:linear-gradient(180deg,var(--s) 55%,transparent);position:sticky;top:0;z-index:20;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hdr-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.1}
.hdr-title span{color:var(--or)}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sr{display:flex;gap:8px}
.sc{flex:1;background:var(--s);border:1px solid var(--b);border-radius:12px;padding:11px 13px}
.sl{font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.sv{font-size:19px;font-weight:700;font-family:'Syne',sans-serif}
.sv span{font-size:11px;color:var(--m);font-weight:400;font-family:'DM Sans',sans-serif}
.pb{height:5px;background:var(--b);border-radius:3px;overflow:hidden;margin-top:7px}
.pf{height:100%;border-radius:3px;transition:width .5s ease}

/* BOTTOM NAV */
.tbar{display:flex;padding:4px 4px 20px;background:var(--s);border-top:1px solid var(--b)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 4px;border:none;background:none;cursor:pointer;border-radius:10px;color:var(--m);font-family:'DM Sans',sans-serif}
.tb.active{background:var(--b);color:var(--or)}
.ti{font-size:20px}.tl{font-size:10px;font-weight:600;letter-spacing:.3px}

/* CARDS / SECTIONS */
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;overflow:hidden}
.sec{padding:0 16px;margin-bottom:14px}
.stl{font-size:10px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-top:2px}
.fi{animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* DAY SWITCHER */
.day-sw{display:flex;align-items:center;gap:8px;padding:0 16px;margin-bottom:12px}
.day-sw-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--b);background:var(--s);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t)}
.day-sw-btn:active{transform:scale(.9)}
.day-sw-mid{flex:1;text-align:center}
.day-sw-mid .dsm-date{font-size:13px;font-weight:600}
.day-sw-mid .dsm-sub{font-size:11px;color:var(--m);margin-top:2px}

/* SCHEDULE STRIP */
.sstrip{display:flex;gap:5px;overflow-x:auto;padding:0 16px 4px;margin-bottom:12px}
.sstrip::-webkit-scrollbar{display:none}
.dc{flex:0 0 auto;width:44px;text-align:center;background:var(--s);border:1px solid var(--b);border-radius:11px;padding:7px 0;cursor:pointer;transition:all .2s}
.dc.today{border-color:var(--or);background:rgba(255,107,53,.12)}
.dc.viewing{border-color:var(--or);box-shadow:0 0 0 2px rgba(255,107,53,.25)}
.dc.skipped{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
.dc.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25)}
.dc .dd{font-size:10px;color:var(--m);font-weight:600;margin-bottom:3px}
.dc.today .dd,.dc.viewing .dd{color:var(--or)}
.dc.skipped .dd{color:var(--re)}
.dc.done .dd{color:var(--gr)}
.dc .di{font-size:16px}
.dc .dt{font-size:7px;font-weight:700;margin-top:2px}

/* DIET */
.dit{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--s);border:1px solid var(--b);border-radius:13px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.dit.done{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.dem{font-size:20px;flex-shrink:0}
.din{flex:1}
.din .dn{font-size:13px;font-weight:500}
.dit.done .dn{color:var(--m);text-decoration:line-through}
.din .dp{font-size:11px;color:var(--gr);margin-top:1px}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--b);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.dit.done .chk{background:var(--gr);border-color:var(--gr)}

/* EXERCISE */
.exc{margin:0 16px 10px;background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden}
.exh{padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px}
.exn{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0}
.exi{flex:1}
.exnm{font-size:13px;font-weight:600;margin-bottom:2px}
.exmt{font-size:11px;color:var(--m)}
.exb{border-top:1px solid var(--b)}

/* EXERCISE ILLUSTRATION BOX */
.ilbox{width:100%;background:#0d0d14;display:flex;align-items:center;justify-content:center;padding:14px;min-height:155px;position:relative}
.ilbox svg{max-width:100%;height:auto}
.mtag{position:absolute;bottom:8px;left:10px;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600}
.ytbtn{position:absolute;bottom:8px;right:10px;background:#FF0000;color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none;font-family:'DM Sans',sans-serif}
.altbtn{position:absolute;top:8px;right:10px;background:rgba(0,0,0,.6);color:var(--m2);border:1px solid var(--b);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* SETS ROW */
.setr{padding:11px 14px;border-top:1px solid var(--b);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sdot{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:700}
.sdot:active{transform:scale(.88)}

/* ALTERNATIVES PANEL */
.altp{border-top:1px solid var(--b);padding:12px 14px}
.altp-ttl{font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.alt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #16161f}
.alt-item:last-child{border-bottom:none}
.alt-name{font-size:12px;color:var(--m2)}
.alt-yt{background:rgba(255,0,0,.12);color:#ff4444;border:1px solid rgba(255,0,0,.2);border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* STEPS */
.stps{padding:13px 14px;border-top:1px solid var(--b)}
.stps h4{font-size:10px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.stp{display:flex;gap:9px;margin-bottom:9px}
.stn{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
.stxt{font-size:12px;line-height:1.6;color:#bbb}
.tipb{background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);border-radius:10px;padding:10px 12px;margin-top:10px}
.tipb p{font-size:12px;color:#bbb;line-height:1.6}

/* SKIP BAR */
.skipb{margin:0 16px 14px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);border-radius:13px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between}
.skpinfo h4{font-size:12px;font-weight:700;margin-bottom:2px}
.skpinfo p{font-size:11px;color:var(--m2)}

/* HISTORY */
.hc{margin:0 16px 9px;background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer}
.hc.today{border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.05)}
.hc.skipped{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.hc.viewing{border-color:var(--or);box-shadow:0 0 0 2px rgba(255,107,53,.2)}
.hdt{width:42px;text-align:center;flex-shrink:0}
.hdd{font-size:10px;color:var(--m);font-weight:600}
.hdn{font-size:19px;font-weight:800;font-family:'Syne',sans-serif;color:var(--m)}
.hc.today .hdn,.hc.today .hdd{color:var(--or)}
.hc.skipped .hdn,.hc.skipped .hdd{color:var(--re)}
.hc.viewing .hdn,.hc.viewing .hdd{color:var(--or)}
.hinfo{flex:1}
.hwk{font-size:12px;font-weight:600;margin-bottom:5px}

/* RING */
.rw{position:relative;width:86px;height:86px;flex-shrink:0}
.rw svg{transform:rotate(-90deg)}
.rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rv{font-size:20px;font-weight:800;font-family:'Syne',sans-serif}
.rs{font-size:10px;color:var(--m)}

/* CONFETTI */
.cp{position:fixed;width:7px;height:7px;pointer-events:none;z-index:999;animation:cfall 2s ease forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* MODAL */
.mob{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mos{background:var(--s);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:40px;animation:sup .3s ease}
.mos::-webkit-scrollbar{display:none}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.moh{width:38px;height:4px;background:var(--b);border-radius:2px;margin:11px auto 0}
</style>
</head>
<body>
<div id="app">
  <div class="scr" id="scr"></div>
  <div class="tbar" id="tbar"></div>
</div>

let S={
  tab:"today", awo:"upper1",
  expEx:null, showAlts:null,
  viewDay:0, // offset from today: 0=today, -1=yesterday, +1=tomorrow (within week)
  sets:{}, diet:{}, skipped:{},
  confetti:false
};

// ══════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════
function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);S.sets=d.sets||{};S.diet=d.diet||{};S.skipped=d.skipped||{}}}catch(e){}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify({sets:S.sets,diet:S.diet,skipped:S.skipped}))}
  catch(e){
    try{
      const cut=new Date();cut.setDate(cut.getDate()-60);const cs=cut.toISOString().split("T")[0];
      Object.keys(S.sets).filter(k=>k<cs).forEach(k=>delete S.sets[k]);
      Object.keys(S.diet).filter(k=>k<cs).forEach(k=>delete S.diet[k]);
      localStorage.setItem(SK,JSON.stringify({sets:S.sets,diet:S.diet,skipped:S.skipped}));
    }catch(e2){}
  }
}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function todayKey(){return new Date().toISOString().split("T")[0]}
function todayDi(){const d=new Date().getDay();return d===0?6:d-1}

// Get a date key offset from today
function offsetKey(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split("T")[0]}
// Get schedule day index for a given date key
function diForKey(dk){const d=new Date(dk+"T12:00:00");const dw=d.getDay();return dw===0?6:dw-1}

function viewKey(){return offsetKey(S.viewDay)}
function viewDi(){return diForKey(viewKey())}
function viewSched(){return SCHED[viewDi()]}
function viewWO(){const s=viewSched();return s.wo!=="rest"?W[s.wo]:null}

function totalProt(dk){const k=dk||todayKey();return DIET.filter(d=>S.diet[`${k}_${d.id}`]).reduce((a,d)=>a+d.p,0)}
function exProg(wk,ei,dk){const k=dk||todayKey();return Array.from({length:W[wk].exercises[ei].sets}).filter((_,si)=>S.sets[`${k}_${wk}_${ei}_${si}`]).length}
function woProg(wk,dk){
  const k=dk||todayKey();
  const tot=W[wk].exercises.reduce((a,e)=>a+e.sets,0);
  const done=W[wk].exercises.reduce((a,e,ei)=>a+Array.from({length:e.sets}).filter((_,si)=>S.sets[`${k}_${wk}_${ei}_${si}`]).length,0);
  return{done,tot,pct:tot?(done/tot)*100:0}
}
function isCompleted(dk,wk){if(!wk||wk==="rest")return false;const p=woProg(wk,dk);return p.done===p.tot&&p.tot>0}

            ${IL[ex.il]||IL.chest_press}
            <div class="mtag" style="background:${ww.color}22;color:${ww.color}">${ex.muscle}</div>
            <button class="altbtn" onclick="toggleAlts('${aw}_${ei}',event)">${showA?'Hide Alts':'Alternatives'}</button>
            <a class="ytbtn" href="${ex.yt}" target="_blank" onclick="event.stopPropagation()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 00.5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
              Watch
            </a>
          </div>`;

        if(showA){
          h+=`<div class="altp"><div class="altp-ttl">Alternative Exercises</div>`;
          ex.alts.forEach(alt=>{
            h+=`<div class="alt-item">
              <span class="alt-name">${alt.n}</span>
              <a class="alt-yt" href="${alt.yt}" target="_blank">▶ Watch</a>
            </div>`;
          });
          h+=`</div>`;
        }

        h+=`<div class="stps"><h4>How To Do It</h4>`;
        ex.steps.forEach((s,i)=>{
          h+=`<div class="stp"><div class="stn" style="background:${ww.color}22;color:${ww.color}">${i+1}</div><div class="stxt">${s}</div></div>`;
        });
        h+=`<div class="tipb"><div style="font-size:9px;color:var(--or);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px">💡 Pro Tip</div><p>${ex.tip}</p></div></div>`;

        h+=`<div class="setr">
          <span style="font-size:11px;color:var(--m);margin-right:4px">Sets:</span>
          ${Array.from({length:ex.sets}).map((_,si)=>{
            const sd=!!S.sets[`${vk}_${aw}_${ei}_${si}`];
            return `<div class="sdot" style="${sd?`background:${ww.color};border-color:${ww.color};color:#0A0A0F`:'color:var(--m);border-color:var(--b)'}" onclick="toggleSet('${aw}',${ei},${si},'${vk}')">
              ${sd?`<svg width="13" height="13" viewBox="0 0 13 13"><path d="M2.5 6.5l3 3 5-5" stroke="#0A0A0F" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg>`:si+1}
            </div>`;
          }).join("")}
          <span style="margin-left:auto;font-size:10px;color:${ww.color};opacity:.6">tap to log</span>
        </div>
        </div>`;
      }
      h+=`</div>`;
    });
  }

  // ─── DIET TAB ───
  else if(S.tab==="diet"){
    h+=`<div class="day-sw">
      <button class="day-sw-btn" onclick="changeDay(-1)">←</button>
      <div class="day-sw-mid">
        <div class="dsm-date">${isToday?'Today':vdateStr}</div>
        <div class="dsm-sub">Protein tracking for this day</div>
      </div>
      <button class="day-sw-btn" onclick="changeDay(1)" style="opacity:${S.viewDay<0?1:.3}">→</button>
    </div>`;

    const prot=totalProt(vk);const pct=Math.min((prot/PT)*100,100);
    h+=`<div class="sec"><div class="card"><div style="display:flex;align-items:center;gap:18px;padding:18px">
      <div class="rw">
        <svg width="86" height="86"><circle cx="43" cy="43" r="34" fill="none" stroke="var(--b)" stroke-width="7"/><circle cx="43" cy="43" r="34" fill="none" stroke="${prot>=PT?'var(--gr)':'var(--or)'}" stroke-width="7" stroke-dasharray="${2*Math.PI*34}" stroke-dashoffset="${2*Math.PI*34*(1-pct/100)}" stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/></svg>
        <div class="rt"><div class="rv" style="color:${prot>=PT?'var(--gr)':'var(--or)'}">${prot}</div><div class="rs">/${PT}g</div></div>
      </div>
      <div>
        <div style="font-size:16px;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:6px">${prot>=PT?"🎉 Target Hit!":prot>100?"Almost there!":"Build up today"}</div>
        <div style="font-size:11px;color:var(--m);line-height:1.9">Target: <strong style="color:var(--or)">${PT}g</strong><br>Left: <strong style="color:var(--t)">${Math.max(0,PT-prot)}g</strong><br>Cals est: <strong style="color:var(--t)">~${Math.round(prot*4+1800)}</strong></div>
      </div>
    </div></div></div>`;

    [...new Set(DIET.map(d=>d.time))].forEach(time=>{
      const items=DIET.filter(d=>d.time===time);
      const tp=items.filter(d=>S.diet[`${vk}_${d.id}`]).reduce((a,d)=>a+d.p,0);
      const tot=items.reduce((a,d)=>a+d.p,0);
      h+=`<div class="sec"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="stl" style="margin-bottom:0">${time}</div><div style="font-size:11px;color:var(--gr);font-weight:700">${tp}/${tot}g</div></div>`;
      items.forEach(item=>{
        const done=!!S.diet[`${vk}_${item.id}`];
        h+=`<div class="dit ${done?'done':''}" onclick="toggleDiet('${item.id}','${vk}')">
          <span class="dem">${item.emoji}</span>
          <div class="din"><div class="dn">${item.label}</div><div class="dp">+${item.p}g · ${item.note}</div></div>
          <div class="chk">${done?`<svg width="13" height="13" viewBox="0 0 13 13"><path d="M2.5 6.5l3 3 5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:''}</div>
        </div>`;
      });
      h+=`</div>`;
    });
  }

  // ─── HISTORY TAB ───
  else if(S.tab==="history"){
    h+=`<div class="sec"><div class="stl">Last 7 Days</div></div>`;
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const dk=d.toISOString().split("T")[0];
      const isTod=dk===todayKey();
      const isView=S.viewDay===(-i);
      const dIdx=d.getDay()===0?6:d.getDay()-1;
      const sch=SCHED[dIdx];
      const skip=!!S.skipped[dk];
      const ww=sch.wo!=="rest"?W[sch.wo]:null;
      const dayP=DIET.filter(item=>S.diet[`${dk}_${item.id}`]).reduce((a,item)=>a+item.p,0);
      const pok=dayP>=PT;
      let wpct=0,wdn=false;
      if(ww&&!skip){const p=woProg(sch.wo,dk);wpct=p.pct;wdn=p.pct===100}

      h+=`<div class="hc ${isTod?'today':''} ${skip?'skipped':''} ${isView?'viewing':''}" onclick="jumpDay(${-i})">
        <div class="hdt"><div class="hdd">${d.toLocaleDateString("en",{weekday:"short"})}</div><div class="hdn">${d.getDate()}</div></div>
        <div class="hinfo">
          <div class="hwk" style="color:${skip?'var(--re)':ww?ww.color:'var(--m)'}">${skip?'Skipped':ww?ww.label:'Rest Day'}</div>
          ${ww&&!skip?`<div class="pb"><div class="pf" style="width:${wpct}%;background:${wdn?'var(--gr)':ww.color}"></div></div>`:`<div style="height:5px;background:${skip?'rgba(239,68,68,.15)':'var(--b)'};border-radius:3px"></div>`}
          <div style="font-size:11px;margin-top:4px;color:${pok?'var(--gr)':dayP>0?'var(--am)':'var(--m)'}">${dayP}g protein ${pok?"✓":""}</div>
        </div>
        <div style="font-size:20px">${skip?'❌':sch.wo==='rest'?'😴':wdn?'🔥':wpct>0?'💪':'⬜'}</div>
      </div>`;
    }

    h+=`<div class="sec" style="margin-top:8px">
      <div class="stl">Daily Targets</div>
      <div class="card" style="padding:14px">
        ${[{l:"Protein",v:"150g",c:"var(--gr)"},{l:"Calories",v:"2800–3000 kcal",c:"var(--or)"},{l:"Water",v:"3–3.5 litres",c:"var(--te)"},{l:"Workouts/week",v:"4 sessions",c:"var(--pu)"},{l:"Creatine (optional)",v:"5g/day",c:"var(--am)"}].map(t=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b)"><span style="font-size:12px;color:var(--m)">${t.l}</span><span style="font-size:12px;color:${t.c};font-weight:700">${t.v}</span></div>`).join("")}
      </div>
    </div>
    <div class="sec"><div class="card" style="padding:13px"><div style="font-size:11px;color:var(--m2);line-height:1.8">💾 <strong style="color:var(--t)">Data saved locally on your phone</strong><br>No cloud, no account. Stays as long as you keep the app. Tap any day in the history to switch to it.</div></div></div>`;
  }

  h+=`</div>`;
  scr.innerHTML=h;

  if(S.confetti){
    const cols=["#FF6B35","#4ECDC4","#A855F7","#F59E0B","#10B981"];
    for(let i=0;i<38;i++){const el=document.createElement("div");el.className="cp";el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%5]};border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.6}s;animation-duration:${1.5+Math.random()}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
    S.confetti=false;
  }
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function setTab(t){S.tab=t;render()}
function setAWO(k){S.awo=k;render()}
function toggleEx(key){S.expEx=S.expEx===key?null:key;S.showAlts=null;render();if(S.expEx){setTimeout(()=>{const cards=document.querySelectorAll(".exc");const idx=parseInt(key.split("_").pop());if(cards[idx])cards[idx].scrollIntoView({behavior:"smooth",block:"nearest"})},60)}}
function toggleAlts(key,e){e.stopPropagation();S.showAlts=S.showAlts===key?null:key;render()}
function toggleSet(wk,ei,si,dk){const k=`${dk}_${wk}_${ei}_${si}`;S.sets[k]=!S.sets[k];save();render()}
function toggleDiet(id,dk){const k=`${dk}_${id}`;S.diet[k]=!S.diet[k];if(totalProt(dk)>=PT)S.confetti=true;save();render()}
function skipDay(dk){S.skipped[dk]=true;save();render()}
function unskipDay(dk){delete S.skipped[dk];save();render()}
function changeDay(delta){
  const next=S.viewDay+delta;
  if(next>0)return; // can't go to future
  S.viewDay=next;
  // sync active workout to viewed day's scheduled workout
  const vsch=SCHED[viewDi()];
  if(vsch.wo!=="rest")S.awo=vsch.wo;
  render();
}
function jumpDay(offset){
  if(offset>0)return;
  S.viewDay=offset;
  const vsch=SCHED[viewDi()];
  if(vsch.wo!=="rest")S.awo=vsch.wo;
  render();
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
load();
const tw=SCHED[todayDi()].wo;
if(tw!=="rest")S.awo=tw;
render();
</script>
</body>
</html>
